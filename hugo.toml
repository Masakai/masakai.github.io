baseURL = 'https://masakai.github.io/'
languageCode = 'ja'
title = '坂井の開発ー徒然なるままに'
copyright = '株式会社　リバーランズ・コンサルティング　Masanori Sakai'
theme = "ananke"

[params]
  # サイト全体のデフォルト背景画像を設定する場合（例: static/images/background.jpg を配置）
  # featured_image = "/images/background.jpg"
  
  # 背景色のクラス（画像がない場合。Tachyonsのクラスが使えます）
  # プロフェッショナルな印象を与えるために濃紺（bg-navy）を設定
  background_color_class = "bg-navy"

  # ボディの背景色とフォント設定
  body_classes = "avenir bg-white"

  # テキストの色
  text_color = "mid-gray"

  # カスタムCSSの登録
  custom_css = ["custom.css"]
