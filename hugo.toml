baseURL = 'https://masakai.github.io/'
languageCode = 'ja'
hasCJKLanguage = true
title = '坂井の開発ー徒然なるままに'
copyright = '株式会社　リバーランズ・コンサルティング　Masanori Sakai'
theme = "ananke"
summaryLength = 70

[[menus.main]]
  name = 'Home'
  pageRef = '/'
  weight = 10

[[menus.main]]
  name = '記事'
  pageRef = '/posts'
  weight = 20

[[menus.main]]
  name = 'About'
  pageRef = '/about'
  weight = 30

[params]
  # サイト全体のデフォルト背景画像を設定する場合（例: static/images/background.jpg を配置）
  featured_image = "/images/hero_image.png"
  featured_image_class = "contain bg-center"
  date_format = "2006-01-02"

#  # 背景色のクラス（画像がない場合。Tachyonsのクラスが使えます）
