<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6efdf"/>
      <stop offset="100%" stop-color="#e0d4be"/>
    </linearGradient>
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="21" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <style>
      .ink{stroke:#5e4a3a;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .fine{stroke-width:1.6}
      .mid{stroke-width:2.5}
      .bold{stroke-width:4}
      .panel{fill:#f8f1e5;stroke:#6a5644;stroke-width:2.2}
      .box{fill:#ecdfca;stroke:#6a5644;stroke-width:2}
      .accent{fill:#c3875a;fill-opacity:0.28;stroke:#875537;stroke-width:1.8}
      .metal{fill:#d9cbb8;stroke:#6a5644;stroke-width:2}
      .text{fill:#45382f;font-family:Menlo, Monaco, monospace}
      .title{font-size:28px;font-weight:700;letter-spacing:1px}
      .label{font-size:17px;font-weight:700}
      .small{font-size:13px}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.8"/>
  <rect x="18" y="18" width="1164" height="594" rx="14" class="ink fine" opacity="0.65"/>
