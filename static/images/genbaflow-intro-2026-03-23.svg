<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GenbaFlow introduction banner</title>
  <desc id="desc">Industrial themed banner with progress cards and flow lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#123b4a"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#dff3ec" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#02131b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1340" cy="140" r="220" fill="#38bdf8" opacity="0.08"/>
  <circle cx="220" cy="760" r="260" fill="#22c55e" opacity="0.10"/>
  <circle cx="1460" cy="760" r="180" fill="#facc15" opacity="0.06"/>

  <g opacity="0.18" stroke="#c7f9e8" stroke-width="2" fill="none">
    <path d="M70 620 C250 520, 360 680, 530 600 S840 470, 1020 560 S1310 700, 1530 540"/>
    <path d="M80 670 C260 570, 350 730, 520 650 S860 520, 1060 610 S1320 760, 1510 640"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="108" y="116" width="948" height="668" rx="34" fill="url(#card)"/>
    <rect x="118" y="126" width="928" height="648" rx="28" fill="none" stroke="#b6e6d5" stroke-opacity="0.55"/>
  </g>

  <rect x="162" y="176" width="214" height="42" rx="21" fill="#0f766e" opacity="0.92"/>
  <text x="269" y="203" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#ecfeff">Manufacturing Cloud</text>

  <text x="162" y="288" font-family="Helvetica, Arial, sans-serif" font-size="74" font-weight="800" fill="#0f172a">GenbaFlow</text>
  <text x="162" y="360" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2937">現場を止めずに、進捗データを見える化。</text>
  <text x="162" y="420" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#334155">QR とシンプル操作で工程実績をリアルタイム記録。</text>
  <text x="162" y="462" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#334155">紙日報の転記待ちを減らし、遅れと滞留をその場で把握。</text>

  <g>
    <rect x="162" y="530" width="240" height="122" rx="22" fill="#ecfdf5"/>
    <rect x="188" y="556" width="104" height="14" rx="7" fill="#16a34a"/>
    <text x="188" y="602" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">最短1日</text>
    <text x="188" y="634" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#166534">試験運用の立ち上げ</text>
  </g>

  <g>
    <rect x="426" y="530" width="240" height="122" rx="22" fill="#eff6ff"/>
    <rect x="452" y="556" width="104" height="14" rx="7" fill="#0ea5e9"/>
    <text x="452" y="602" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0c4a6e">自動集計</text>
    <text x="452" y="634" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#0f172a">日報作成の手間を削減</text>
  </g>

  <g>
    <rect x="690" y="530" width="290" height="122" rx="22" fill="#fffbeb"/>
    <rect x="716" y="556" width="132" height="14" rx="7" fill="#f59e0b"/>
    <text x="716" y="602" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">スマホ完結</text>
    <text x="716" y="634" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#78350f">ブラウザですぐ定着</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="178" width="338" height="504" rx="30" fill="#0b1323" fill-opacity="0.88" stroke="#7dd3fc" stroke-opacity="0.35"/>
  </g>

  <text x="1156" y="238" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#e2e8f0">進捗ダッシュボード</text>
  <text x="1156" y="278" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#93c5fd">現場・管理者・経営が同じ数字を見る</text>

  <g>
    <rect x="1156" y="320" width="248" height="18" rx="9" fill="#1e293b"/>
    <rect x="1156" y="320" width="196" height="18" rx="9" fill="url(#accent)"/>
    <text x="1156" y="308" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#cbd5e1">工程A 稼働率</text>
  </g>

  <g>
    <rect x="1156" y="392" width="248" height="18" rx="9" fill="#1e293b"/>
    <rect x="1156" y="392" width="148" height="18" rx="9" fill="#22c55e"/>
    <text x="1156" y="380" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#cbd5e1">工程B 完了数</text>
  </g>

  <g>
    <rect x="1156" y="464" width="248" height="18" rx="9" fill="#1e293b"/>
    <rect x="1156" y="464" width="118" height="18" rx="9" fill="#f59e0b"/>
    <text x="1156" y="452" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#cbd5e1">工程C 滞留</text>
  </g>

  <g>
    <rect x="1156" y="542" width="184" height="54" rx="18" fill="#111827" stroke="#4ade80" stroke-opacity="0.45"/>
    <text x="1182" y="565" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#a7f3d0">紙運用との比較</text>
    <text x="1182" y="589" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">リアルタイム共有</text>
  </g>

