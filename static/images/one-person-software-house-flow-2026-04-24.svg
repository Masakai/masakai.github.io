<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">一人ソフトウエアハウスの変化</title>
  <desc id="desc">従来の一人開発と、CodexやClaude Codeを使ったエージェント時代の一人ソフトウエアハウスを比較した図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbfc" />
      <stop offset="100%" stop-color="#eef4f7" />
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c5c" />
      <stop offset="100%" stop-color="#2a7f98" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc80" />
      <stop offset="100%" stop-color="#f4a261" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#204050" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #11313d; }
      .sub { font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #42606b; }
      .small { font: 500 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #35505b; }
      .cardTitle { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #12343f; }
      .cardText { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #35505b; }
      .pill { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f4c5c; }
      .hero { font: 700 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .heroSub { font: 500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dbe8ee; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)" />

  <rect x="60" y="40" width="1280" height="120" rx="28" fill="url(#hero)" filter="url(#shadow)" />
  <text x="100" y="92" class="hero">Codex / Claude Code が変える「一人ソフトウエアハウス」</text>
  <text x="100" y="132" class="heroSub">1人で全部抱える開発から、1人で複数の役割を運営する開発へ</text>

  <rect x="70" y="200" width="580" height="540" rx="28" fill="#ffffff" filter="url(#shadow)" />
  <rect x="750" y="200" width="580" height="540" rx="28" fill="#ffffff" filter="url(#shadow)" />

  <text x="110" y="255" class="label">従来の一人開発</text>
  <text x="790" y="255" class="label">エージェント時代の一人ソフトウエアハウス</text>

  <text x="110" y="292" class="sub">作業が直列で詰まりやすい</text>
  <text x="790" y="292" class="sub">作業を分解して並列に進めやすい</text>

  <rect x="115" y="335" width="490" height="78" rx="18" fill="#eef4f7" />
  <text x="145" y="383" class="cardTitle">仕様を考える</text>
  <rect x="115" y="435" width="490" height="78" rx="18" fill="#eef4f7" />
  <text x="145" y="483" class="cardTitle">自分で実装する</text>
  <rect x="115" y="535" width="490" height="78" rx="18" fill="#eef4f7" />
  <text x="145" y="583" class="cardTitle">自分でテストする</text>
  <rect x="115" y="635" width="490" height="78" rx="18" fill="#eef4f7" />
  <text x="145" y="683" class="cardTitle">ドキュメントと運用が後回しになる</text>

  <path d="M360 414 L360 434" stroke="#8aa2ac" stroke-width="6" stroke-linecap="round" />
  <path d="M360 514 L360 534" stroke="#8aa2ac" stroke-width="6" stroke-linecap="round" />
  <path d="M360 614 L360 634" stroke="#8aa2ac" stroke-width="6" stroke-linecap="round" />

  <rect x="810" y="338" width="200" height="70" rx="18" fill="#e0f2f1" />
  <text x="840" y="382" class="cardTitle">実装</text>
  <rect x="1045" y="338" width="200" height="70" rx="18" fill="#fff1e6" />
  <text x="1080" y="382" class="cardTitle">テスト</text>
  <rect x="810" y="433" width="200" height="70" rx="18" fill="#edf6ff" />
  <text x="830" y="477" class="cardTitle">文書更新</text>
  <rect x="1045" y="433" width="200" height="70" rx="18" fill="#f3eefc" />
  <text x="1078" y="477" class="cardTitle">UI調整</text>
  <rect x="810" y="528" width="200" height="70" rx="18" fill="#eef7e9" />
  <text x="832" y="572" class="cardTitle">運用確認</text>
  <rect x="1045" y="528" width="200" height="70" rx="18" fill="#fff7da" />
  <text x="1063" y="572" class="cardTitle">Issue整理</text>

  <circle cx="1020" cy="470" r="76" fill="#0f4c5c" />
  <text x="963" y="462" class="heroSub">人間の役割</text>
  <text x="947" y="490" class="heroSub">分解・判断・統合</text>

  <path d="M1018 394 C1018 370, 975 365, 940 373" stroke="#61c0bf" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M1097 404 C1125 393, 1166 391, 1185 404" stroke="#f4a261" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M955 525 C942 546, 928 549, 910 548" stroke="#7bb3ff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M1088 530 C1110 548, 1140 553, 1164 548" stroke="#c6a0ff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M986 543 C976 584, 962 619, 930 654" stroke="#7bc47f" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M1062 542 C1082 586, 1104 620, 1145 654" stroke="#f0c35c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <rect x="835" y="640" width="410" height="70" rx="35" fill="url(#accent)" />
  <text x="885" y="684" class="pill">機能開発 + 運用保守 + 文書化が同時に進む</text>

  <text x="110" y="765" class="small">例: GenbaFlow のような実サービスでは、機能開発に加えて fail2ban 確認や ISO 27005 ベースの運用整理まで回せるかが差になる。</text>
</svg>
